<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Study Planner - USIU-Africa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --usiu-blue: #1E4B96;
      --usiu-blue-dark: #153873;
      --usiu-blue-light: #D6E4F5;
      --usiu-gold: #FFD20F;
      --usiu-gold-dark: #E5BD00;
      --usiu-gold-light: #FFF7D6;
      --success: #2E7D32;
      --success-light: #E8F5E9;
      --danger: #C62828;
      --danger-light: #FFEBEE;
      --warning: #E65100;
      --warning-light: #FFF3E0;
      --white: #FFFFFF;
      --gray-50: #FAFBFD;
      --gray-100: #F0F2F6;
      --gray-200: #E2E6EE;
      --gray-300: #CDD4E0;
      --gray-400: #9EA8BA;
      --gray-500: #7A8699;
      --gray-600: #5A6478;
      --gray-700: #3D4660;
      --gray-800: #2A3148;
      --gray-900: #1A1F30;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 16px;
      --transition: all 0.3s ease;
      --shadow-sm: 0 1px 3px rgba(30,75,150,0.06);
      --shadow-md: 0 4px 12px rgba(30,75,150,0.08);
      --shadow-lg: 0 10px 30px rgba(30,75,150,0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', Arial, sans-serif;
      background: var(--gray-100);
      color: var(--gray-900);
      min-height: 100vh;
      line-height: 1.6;
    }

    a { text-decoration: none; color: inherit; }

    /* ===== NAVBAR ===== */
    .navbar {
      background: var(--usiu-blue);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(30,75,150,0.2);
      height: 64px;
    }

    .navbar .logo-area {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .navbar .logo-area img {
      height: 44px;
      width: auto;
    }

    .navbar .logo-text {
      color: var(--white);
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .navbar .logo-text span {
      color: var(--usiu-gold);
      font-weight: 600;
    }

    .navbar nav {
      display: flex;
      gap: 4px;
    }

    .navbar nav a {
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
      transition: var(--transition);
      cursor: pointer;
    }

    .navbar nav a:hover {
      background: rgba(255,255,255,0.1);
      color: var(--white);
    }

    .navbar nav a.active {
      background: var(--usiu-gold);
      color: var(--usiu-blue-dark);
      font-weight: 600;
    }

    /* ===== CONTAINER ===== */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    /* ===== PAGES ===== */
    .page { display: none; animation: fadeSlideIn 0.35s ease; }
    .page.active { display: block; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== HERO ===== */
    .hero {
      text-align: center;
      padding: 44px 28px;
      background: linear-gradient(135deg, var(--usiu-blue) 0%, var(--usiu-blue-dark) 100%);
      color: var(--white);
      border-radius: var(--radius-lg);
      margin-bottom: 32px;
      box-shadow: 0 8px 30px rgba(30,75,150,0.18);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      top: -40%;
      right: -20%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255,210,15,0.12) 0%, transparent 70%);
      border-radius: 50%;
    }

    .hero::after {
      content: "";
      position: absolute;
      bottom: -30%;
      left: -10%;
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(255,210,15,0.08) 0%, transparent 70%);
      border-radius: 50%;
    }

    .hero h1 {
      font-size: 1.8rem;
      margin-bottom: 10px;
      font-weight: 700;
      position: relative;
      z-index: 1;
    }

    .hero h1 .gold { color: var(--usiu-gold); }

    .hero p {
      font-size: 1.05rem;
      opacity: 0.92;
      max-width: 520px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* ===== STATISTICS CARDS ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 24px 18px;
      text-align: center;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      border-top: 4px solid var(--usiu-blue);
    }

    .stat-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
    }

    .stat-card.completed { border-top-color: var(--success); }
    .stat-card.pending { border-top-color: var(--usiu-gold); }

    .stat-card .stat-icon {
      font-size: 1.6rem;
      margin-bottom: 6px;
      font-weight: 700;
      color: var(--usiu-blue);
    }

    .stat-card.completed .stat-icon { color: var(--success); }
    .stat-card.pending .stat-icon { color: var(--usiu-gold-dark); }

    .stat-card .stat-number {
      font-size: 2rem;
      font-weight: 700;
      color: var(--gray-800);
    }

    .stat-card .stat-label {
      font-size: 0.85rem;
      color: var(--gray-500);
      font-weight: 500;
      margin-top: 2px;
    }

    /* ===== BUTTONS ===== */
    .actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }

    .btn-primary {
      background: var(--usiu-blue);
      color: var(--white);
      box-shadow: 0 4px 14px rgba(30,75,150,0.25);
    }

    .btn-primary:hover {
      background: var(--usiu-blue-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(30,75,150,0.3);
    }

    .btn-gold {
      background: var(--usiu-gold);
      color: var(--usiu-blue-dark);
      box-shadow: 0 4px 14px rgba(255,210,15,0.3);
      font-weight: 700;
    }

    .btn-gold:hover {
      background: var(--usiu-gold-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(255,210,15,0.4);
    }

    .btn-success {
      background: var(--success);
      color: var(--white);
      box-shadow: 0 3px 10px rgba(46,125,50,0.2);
    }

    .btn-success:hover {
      background: #1B5E20;
      transform: translateY(-2px);
    }

    .btn-danger {
      background: var(--danger);
      color: var(--white);
      box-shadow: 0 3px 10px rgba(198,40,40,0.2);
    }

    .btn-danger:hover {
      background: #B71C1C;
      transform: translateY(-2px);
    }

    .btn-outline {
      background: transparent;
      color: var(--usiu-blue);
      border: 2px solid var(--usiu-blue);
    }

    .btn-outline:hover {
      background: var(--usiu-blue);
      color: var(--white);
    }

    .btn-sm {
      padding: 7px 14px;
      font-size: 0.82rem;
      border-radius: 6px;
    }

    /* ===== FORM ===== */
    .form-container {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px 32px;
      box-shadow: var(--shadow-md);
      max-width: 560px;
      margin: 0 auto;
      border: 1px solid var(--gray-200);
    }

    .form-container h2 {
      font-size: 1.4rem;
      margin-bottom: 24px;
      color: var(--usiu-blue);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-group { margin-bottom: 20px; }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 0.88rem;
      color: var(--gray-700);
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid var(--gray-300);
      border-radius: var(--radius-sm);
      font-size: 0.92rem;
      font-family: inherit;
      color: var(--gray-800);
      transition: var(--transition);
      background: var(--gray-50);
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--usiu-blue);
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(30,75,150,0.1);
    }

    .form-group input::placeholder { color: var(--gray-400); }

    /* Priority radio buttons */
    .priority-group {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    .priority-option { flex: 1; }

    .priority-option input[type="radio"] { display: none; }

    .priority-option label {
      display: block;
      text-align: center;
      padding: 10px 10px;
      border: 2px solid var(--gray-300);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.82rem;
      transition: var(--transition);
      background: var(--gray-50);
    }

    .priority-option input[type="radio"]:checked + label {
      color: var(--white);
      border-color: transparent;
    }

    .priority-option.high input[type="radio"]:checked + label { background: var(--danger); }
    .priority-option.medium input[type="radio"]:checked + label { background: var(--warning); }
    .priority-option.low input[type="radio"]:checked + label { background: var(--success); }
    .priority-option label:hover { border-color: var(--gray-400); }

    /* ===== TASKS DASHBOARD ===== */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .page-header h2 {
      font-size: 1.4rem;
      color: var(--usiu-blue);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .filter-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 14px;
      border: 2px solid var(--gray-300);
      border-radius: 20px;
      background: var(--white);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      color: var(--gray-600);
    }

    .filter-btn:hover { border-color: var(--usiu-blue); color: var(--usiu-blue); }

    .filter-btn.active {
      background: var(--usiu-blue);
      color: var(--white);
      border-color: var(--usiu-blue);
    }

    /* ===== TASK CARDS ===== */
    .tasks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
    }

    .task-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow-sm);
      border-left: 5px solid var(--usiu-blue);
      transition: var(--transition);
    }

    .task-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .task-card.priority-high { border-left-color: var(--danger); }
    .task-card.priority-medium { border-left-color: var(--usiu-gold-dark); }
    .task-card.priority-low { border-left-color: var(--success); }

    .task-card.completed { opacity: 0.65; border-left-color: var(--gray-400); }
    .task-card.completed .task-name { text-decoration: line-through; color: var(--gray-500); }

    .task-card .task-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--gray-800);
      margin-bottom: 10px;
    }

    .task-card .task-details { margin-bottom: 14px; }

    .task-card .task-detail {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: var(--gray-600);
      margin-bottom: 5px;
    }

    .task-card .task-detail .detail-label {
      font-weight: 600;
      color: var(--gray-700);
    }

    .priority-badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .priority-badge.high { background: var(--danger-light); color: var(--danger); }
    .priority-badge.medium { background: var(--warning-light); color: var(--warning); }
    .priority-badge.low { background: var(--success-light); color: var(--success); }

    .status-badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-left: 5px;
    }

    .status-badge.pending { background: var(--usiu-gold-light); color: var(--warning); }
    .status-badge.done { background: var(--success-light); color: var(--success); }

    .task-card .task-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--gray-200);
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: var(--gray-500);
    }

    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 14px; color: var(--usiu-blue); opacity: 0.4; }
    .empty-state h3 { font-size: 1.15rem; margin-bottom: 6px; color: var(--gray-600); }
    .empty-state p { font-size: 0.88rem; margin-bottom: 18px; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      padding: 13px 22px;
      border-radius: var(--radius-sm);
      color: var(--white);
      font-weight: 600;
      font-size: 0.88rem;
      box-shadow: var(--shadow-lg);
      z-index: 1000;
      transform: translateX(120%);
      transition: transform 0.4s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast.show { transform: translateX(0); }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    .toast.info { background: var(--usiu-blue); }

    /* ===== EDIT MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26,31,48,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
      opacity: 0;
      visibility: hidden;
      transition: var(--transition);
    }

    .modal-overlay.show { opacity: 1; visibility: visible; }

    .modal {
      background: var(--white);
      border-radius: var(--radius);
      padding: 30px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 50px rgba(30,75,150,0.15);
      transform: scale(0.9);
      transition: var(--transition);
    }

    .modal-overlay.show .modal { transform: scale(1); }

    .modal h3 {
      font-size: 1.2rem;
      margin-bottom: 18px;
      color: var(--usiu-blue);
    }

    .modal .form-group { margin-bottom: 14px; }
    .modal .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .navbar {
        flex-direction: column;
        gap: 10px;
        padding: 10px 16px;
        height: auto;
      }

      .navbar nav { width: 100%; justify-content: center; }
      .navbar nav a { padding: 7px 14px; font-size: 0.82rem; }

      .hero { padding: 30px 20px; }
      .hero h1 { font-size: 1.4rem; }
      .hero p { font-size: 0.92rem; }

      .stats-grid { grid-template-columns: 1fr; gap: 12px; }

      .stat-card {
        padding: 18px 14px;
        display: flex;
        align-items: center;
        gap: 14px;
        text-align: left;
      }

      .stat-card .stat-icon { margin-bottom: 0; font-size: 1.3rem; }
      .stat-card .stat-number { font-size: 1.5rem; }

      .tasks-grid { grid-template-columns: 1fr; }
      .form-container { padding: 24px 18px; }
      .priority-group { flex-direction: column; gap: 8px; }
      .actions { flex-direction: column; align-items: center; }

      .btn {
        width: 100%;
        justify-content: center;
        max-width: 280px;
      }

      .page-header { flex-direction: column; align-items: flex-start; }
      .toast { left: 14px; right: 14px; bottom: 14px; }
    }

    @media (max-width: 480px) {
      .container { padding: 14px 10px; }
      .task-card { padding: 16px; }
      .task-card .task-actions { flex-direction: column; }
      .task-card .task-actions .btn-sm { width: 100%; justify-content: center; }
    }
  </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="container">

    <!-- ──── PAGE 1: HOME ──── -->
    <section class="page active" id="page-home">

      <div class="hero">
        <h1>Smart <span class="gold">Study Planner</span></h1>
        <p id="hero-message">Organise your coursework, track deadlines, and stay ahead of the semester.</p>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">Tasks</div>
          <div>
            <div class="stat-number" id="stat-total">0</div>
            <div class="stat-label">Total Tasks</div>
          </div>
        </div>
        <div class="stat-card completed">
          <div class="stat-icon">Done</div>
          <div>
            <div class="stat-number" id="stat-completed">0</div>
            <div class="stat-label">Completed</div>
          </div>
        </div>
        <div class="stat-card pending">
          <div class="stat-icon">Left</div>
          <div>
            <div class="stat-number" id="stat-pending">0</div>
            <div class="stat-label">Pending</div>
          </div>
        </div>
      </div>

      <div class="actions">
        <a class="btn btn-gold nav-link" data-page="add-task">Add Task</a>
        <a class="btn btn-primary nav-link" data-page="tasks">View Tasks</a>
      </div>

    </section>

    <!-- ──── PAGE 2: ADD TASK ──── -->
    <section class="page" id="page-add-task">

      <div class="form-container">
        <h2>Add New Task</h2>

        <form id="task-form">

          <div class="form-group">
            <label for="task-name">Task Name</label>
            <input type="text" id="task-name" placeholder="e.g. Database Assignment" required />
          </div>

          <div class="form-group">
            <label for="course">Course</label>
            <input type="text" id="course" placeholder="e.g. Database Systems" required />
          </div>

          <div class="form-group">
            <label for="due-date">Due Date</label>
            <input type="date" id="due-date" required />
          </div>

          <div class="form-group">
            <label>Priority</label>
            <div class="priority-group">
              <div class="priority-option high">
                <input type="radio" name="priority" id="priority-high" value="High" />
                <label for="priority-high">High</label>
              </div>
              <div class="priority-option medium">
                <input type="radio" name="priority" id="priority-medium" value="Medium" />
                <label for="priority-medium">Medium</label>
              </div>
              <div class="priority-option low">
                <input type="radio" name="priority" id="priority-low" value="Low" />
                <label for="priority-low">Low</label>
              </div>
            </div>
          </div>

          <button type="submit" class="btn btn-gold" style="width: 100%; justify-content: center; margin-top: 6px;">
            Save Task
          </button>

        </form>
      </div>

    </section>

    <!-- ──── PAGE 3: DASHBOARD ──── -->
    <section class="page" id="page-tasks">

      <div class="page-header">
        <h2>My Tasks</h2>
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="pending">Pending</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
          <button class="filter-btn" data-filter="high">High</button>
          <button class="filter-btn" data-filter="medium">Medium</button>
          <button class="filter-btn" data-filter="low">Low</button>
        </div>
      </div>

      <div class="tasks-grid" id="tasks-container"></div>

    </section>

  </main>

  <!-- ===== JAVASCRIPT ===== -->
  <script>
    var STORAGE_KEY = "studyPlannerTasks";

    function getTasks() {
      var data = localStorage.getItem(STORAGE_KEY);
      return data ? JSON.parse(data) : [];
    }

    function saveTasks(tasks) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function generateId() {
      return Date.now() + Math.floor(Math.random() * 1000);
    }

    // ── Navigation ──
    function navigateTo(pageName) {
      document.querySelectorAll(".page").forEach(function(p) { p.classList.remove("active"); });
      var target = document.getElementById("page-" + pageName);
      if (target) target.classList.add("active");

      document.querySelectorAll(".nav-link").forEach(function(link) {
        link.classList.remove("active");
        if (link.dataset.page === pageName) link.classList.add("active");
      });

      if (pageName === "home") initHomePage();
      if (pageName === "tasks") initDashboard();
    }

    function handleNavClick(e) {
      var page = e.currentTarget.dataset.page;
      if (page) { e.preventDefault(); navigateTo(page); }
    }

    // ── Toast ──
    function showToast(message, type) {
      type = type || "success";
      var existing = document.querySelector(".toast");
      if (existing) existing.remove();

      var toast = document.createElement("div");
      toast.className = "toast " + type;
      toast.textContent = message;
      document.body.appendChild(toast);

      requestAnimationFrame(function() { toast.classList.add("show"); });
      setTimeout(function() {
        toast.classList.remove("show");
        setTimeout(function() { toast.remove(); }, 400);
      }, 3000);
    }

    // ── Home Page ──
    function initHomePage() {
      var tasks = getTasks();
      var total = tasks.length;
      var completed = tasks.filter(function(t) { return t.status === "Completed"; }).length;
      var pending = total - completed;

      var totalEl = document.getElementById("stat-total");
      var completedEl = document.getElementById("stat-completed");
      var pendingEl = document.getElementById("stat-pending");

      if (totalEl) totalEl.textContent = total;
      if (completedEl) completedEl.textContent = completed;
      if (pendingEl) pendingEl.textContent = pending;

      var msgEl = document.getElementById("hero-message");
      if (msgEl) {
        var hour = new Date().getHours();
        var msg = "";

        if (total === 0) {
          if (hour < 12) msg = "Fresh start this morning. Add your first task and stay on track.";
          else if (hour < 17) msg = "No tasks yet? Add one and stay on track.";
          else msg = "Before you wind down, jot down what's coming up this week.";
        } else if (completed === total) {
          msg = "You finished everything. Go relax, you've earned it.";
        } else if (pending <= 2) {
          msg = "Almost there \u2014 just " + pending + (pending > 1 ? " tasks" : " task") + " left. Keep going.";
        } else {
          if (hour < 12) msg = "Good morning. " + pending + " tasks waiting \u2014 tackle the high-priority ones first.";
          else if (hour < 17) msg = pending + " tasks on your plate. Pick one and start \u2014 momentum does the rest.";
          else msg = pending + " tasks to go. Knock out one more before calling it a day.";
        }

        msgEl.textContent = msg;
      }
    }

    // ── Add Task ──
    function initAddTaskPage() {
      var form = document.getElementById("task-form");
      if (!form) return;

      form.addEventListener("submit", function(e) {
        e.preventDefault();

        var taskName = document.getElementById("task-name").value.trim();
        var course = document.getElementById("course").value.trim();
        var dueDate = document.getElementById("due-date").value;
        var priority = document.querySelector('input[name="priority"]:checked');

        if (!taskName) { showToast("Don't forget the task name.", "error"); return; }
        if (!course) { showToast("Which course is this for?", "error"); return; }
        if (!dueDate) { showToast("Pick a due date so you never miss it.", "error"); return; }
        if (!priority) { showToast("How important is this? Pick a priority.", "error"); return; }

        var newTask = {
          id: generateId(),
          task: taskName,
          course: course,
          dueDate: dueDate,
          priority: priority.value,
          status: "Pending"
        };

        var tasks = getTasks();
        tasks.push(newTask);
        saveTasks(tasks);

        form.reset();
        showToast("Task saved. You're on top of it.");
        setTimeout(function() { navigateTo("tasks"); }, 600);
      });
    }

    // ── Dashboard ──
    var currentFilter = "all";

    function initDashboard() {
      renderTasks();
      initFilters();
    }

    function renderTasks() {
      var container = document.getElementById("tasks-container");
      if (!container) return;

      var tasks = getTasks();

      if (currentFilter === "pending") tasks = tasks.filter(function(t) { return t.status === "Pending"; });
      else if (currentFilter === "completed") tasks = tasks.filter(function(t) { return t.status === "Completed"; });
      else if (currentFilter === "high") tasks = tasks.filter(function(t) { return t.priority === "High"; });
      else if (currentFilter === "medium") tasks = tasks.filter(function(t) { return t.priority === "Medium"; });
      else if (currentFilter === "low") tasks = tasks.filter(function(t) { return t.priority === "Low"; });

      if (tasks.length === 0) {
        container.innerHTML =
          '<div class="empty-state" style="grid-column: 1 / -1;">' +
            '<div class="empty-icon">--</div>' +
            '<h3>Nothing here yet</h3>' +
            '<p>Add a task and stay on track.</p>' +
            '<a class="btn btn-gold nav-link" data-page="add-task">Add Task</a>' +
          '</div>';
        var emptyLink = container.querySelector(".nav-link");
        if (emptyLink) emptyLink.addEventListener("click", handleNavClick);
        return;
      }

      var priorityOrder = { High: 0, Medium: 1, Low: 2 };
      tasks.sort(function(a, b) {
        if (a.status !== b.status) return a.status === "Pending" ? -1 : 1;
        if (a.priority !== b.priority) return priorityOrder[a.priority] - priorityOrder[b.priority];
        return new Date(a.dueDate) - new Date(b.dueDate);
      });

      var html = "";
      for (var i = 0; i < tasks.length; i++) { html += createTaskCard(tasks[i]); }
      container.innerHTML = html;
    }

    function createTaskCard(task) {
      var isCompleted = task.status === "Completed";
      var priorityClass = task.priority.toLowerCase();
      var formattedDate = formatDate(task.dueDate);

      var actionBtn = isCompleted
        ? '<button class="btn btn-outline btn-sm" onclick="markPending(' + task.id + ')">Reopen</button>'
        : '<button class="btn btn-success btn-sm" onclick="markComplete(' + task.id + ')">Complete</button>';

      return (
        '<div class="task-card priority-' + priorityClass + (isCompleted ? " completed" : "") + '">' +
          '<div class="task-name">' + escapeHtml(task.task) + '</div>' +
          '<div class="task-details">' +
            '<div class="task-detail"><span class="detail-label">Course:</span> <span>' + escapeHtml(task.course) + '</span></div>' +
            '<div class="task-detail"><span class="detail-label">Due:</span> <span>' + formattedDate + '</span></div>' +
            '<div class="task-detail"><span class="detail-label">Priority:</span> <span class="priority-badge ' + priorityClass + '">' + task.priority + '</span>' +
              '<span class="status-badge ' + (isCompleted ? "done" : "pending") + '">' + task.status + '</span></div>' +
          '</div>' +
          '<div class="task-actions">' +
            actionBtn +
            '<button class="btn btn-primary btn-sm" onclick="openEditModal(' + task.id + ')">Edit</button>' +
            '<button class="btn btn-danger btn-sm" onclick="deleteTask(' + task.id + ')">Delete</button>' +
          '</div>' +
        '</div>'
      );
    }

    function formatDate(dateStr) {
      var date = new Date(dateStr + "T00:00:00");
      var options = { day: "numeric", month: "long", year: "numeric" };
      return date.toLocaleDateString("en-GB", options);
    }

    function escapeHtml(text) {
      var map = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" };
      return text.replace(/[&<>"']/g, function(m) { return map[m]; });
    }

    function initFilters() {
      var filterBtns = document.querySelectorAll(".filter-btn");
      filterBtns.forEach(function(btn) {
        // Clone to remove old listeners, then re-add
        var clone = btn.cloneNode(true);
        btn.parentNode.replaceChild(clone, btn);
      });
      // Re-query after cloning
      var freshBtns = document.querySelectorAll(".filter-btn");
      freshBtns.forEach(function(btn) {
        btn.addEventListener("click", function() {
          freshBtns.forEach(function(b) { b.classList.remove("active"); });
          this.classList.add("active");
          currentFilter = this.dataset.filter;
          renderTasks();
        });
      });
    }

    // ── CRUD ──
    function markComplete(id) {
      var tasks = getTasks();
      var index = tasks.findIndex(function(t) { return t.id === id; });
      if (index !== -1) {
        tasks[index].status = "Completed";
        saveTasks(tasks);
        renderTasks();
        showToast("Task completed. Well done.");
      }
    }

    function markPending(id) {
      var tasks = getTasks();
      var index = tasks.findIndex(function(t) { return t.id === id; });
      if (index !== -1) {
        tasks[index].status = "Pending";
        saveTasks(tasks);
        renderTasks();
        showToast("Task reopened.", "info");
      }
    }

    function deleteTask(id) {
      if (!confirm("Are you sure you want to delete this task?")) return;
      var tasks = getTasks();
      tasks = tasks.filter(function(t) { return t.id !== id; });
      saveTasks(tasks);
      renderTasks();
      showToast("Task deleted.", "error");
    }

    // ── Edit Modal ──
    function openEditModal(id) {
      var tasks = getTasks();
      var task = tasks.find(function(t) { return t.id === id; });
      if (!task) return;

      var overlay = document.createElement("div");
      overlay.className = "modal-overlay";
      overlay.id = "edit-modal";
      overlay.innerHTML =
        '<div class="modal">' +
          '<h3>Edit Task</h3>' +
          '<div class="form-group">' +
            '<label for="edit-task-name">Task Name</label>' +
            '<input type="text" id="edit-task-name" value="' + escapeHtml(task.task) + '" />' +
          '</div>' +
          '<div class="form-group">' +
            '<label for="edit-course">Course</label>' +
            '<input type="text" id="edit-course" value="' + escapeHtml(task.course) + '" />' +
          '</div>' +
          '<div class="form-group">' +
            '<label for="edit-due-date">Due Date</label>' +
            '<input type="date" id="edit-due-date" value="' + task.dueDate + '" />' +
          '</div>' +
          '<div class="form-group">' +
            '<label>Priority</label>' +
            '<div class="priority-group">' +
              '<div class="priority-option high">' +
                '<input type="radio" name="edit-priority" id="edit-high" value="High"' + (task.priority === "High" ? " checked" : "") + ' />' +
                '<label for="edit-high">High</label>' +
              '</div>' +
              '<div class="priority-option medium">' +
                '<input type="radio" name="edit-priority" id="edit-medium" value="Medium"' + (task.priority === "Medium" ? " checked" : "") + ' />' +
                '<label for="edit-medium">Medium</label>' +
              '</div>' +
              '<div class="priority-option low">' +
                '<input type="radio" name="edit-priority" id="edit-low" value="Low"' + (task.priority === "Low" ? " checked" : "") + ' />' +
                '<label for="edit-low">Low</label>' +
              '</div>' +
            '</div>' +
          '</div>' +
          '<div class="modal-actions">' +
            '<button class="btn btn-outline btn-sm" onclick="closeEditModal()">Cancel</button>' +
            '<button class="btn btn-primary btn-sm" onclick="saveEdit(' + id + ')">Save Changes</button>' +
          '</div>' +
        '</div>';

      document.body.appendChild(overlay);
      requestAnimationFrame(function() { overlay.classList.add("show"); });

      overlay.addEventListener("click", function(e) {
        if (e.target === overlay) closeEditModal();
      });

      document.addEventListener("keydown", function handler(e) {
        if (e.key === "Escape") { closeEditModal(); document.removeEventListener("keydown", handler); }
      });
    }

    function closeEditModal() {
      var overlay = document.getElementById("edit-modal");
      if (overlay) {
        overlay.classList.remove("show");
        setTimeout(function() { overlay.remove(); }, 300);
      }
    }

    function saveEdit(id) {
      var taskName = document.getElementById("edit-task-name").value.trim();
      var course = document.getElementById("edit-course").value.trim();
      var dueDate = document.getElementById("edit-due-date").value;
      var priority = document.querySelector('input[name="edit-priority"]:checked');

      if (!taskName || !course || !dueDate || !priority) {
        showToast("Looks like something's missing. Fill in all fields.", "error");
        return;
      }

      var tasks = getTasks();
      var index = tasks.findIndex(function(t) { return t.id === id; });
      if (index !== -1) {
        tasks[index].task = taskName;
        tasks[index].course = course;
        tasks[index].dueDate = dueDate;
        tasks[index].priority = priority.value;
        saveTasks(tasks);
        closeEditModal();
        renderTasks();
        showToast("Task updated. Looking good.");
      }
    }

    // ── Init ──
    document.addEventListener("DOMContentLoaded", function() {
      document.querySelectorAll(".nav-link").forEach(function(link) {
        link.addEventListener("click", handleNavClick);
      });
      initAddTaskPage();
      initHomePage();
    });
  </script>

</body>
</html>
